# 示例配置文件 - 数据库、串口和日志配置

[database]
host = localhost
port = 5432
username = admin
password = secret123
database = myapp_db
connection_timeout = 30
use_ssl = true
max_connections = 100
auto_commit = false

[serial_port]
device = /dev/ttyUSB0
baud_rate = 115200
data_bits = 8
stop_bits = 1
parity = none
flow_control = none
timeout = 5000
enable = true

[logging]
level = INFO
file = /var/log/myapp.log
max_file_size = 10485760
backup_count = 5
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
console_output = true
file_output = true
rotate = true
